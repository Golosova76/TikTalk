@if (message(); as message) {
  <tt-avatar-circle [avatarUrl]="message.user?.avatarUrl" [class]="'size32'"></tt-avatar-circle>

  <div class="message-wrapper message">
    <div class="message__title">
      <div class="message__surname">{{ message.user?.firstName }} {{ message.user?.lastName }}</div>
      <div class="message__date">{{ message.createdAt | luxonDate: "HH:mm" }}</div>
    </div>
    <div class="message__text">{{ message.text }}</div>
  </div>
}
