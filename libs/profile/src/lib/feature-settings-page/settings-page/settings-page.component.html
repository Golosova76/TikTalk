<div class="settings-body">
  <div class="settings-about">
    <header class="profile-page__header">
      @if (profile$ | async; as profile) {
        <tt-profile-header [profile]="profile" layoutClass="vertical-layout"></tt-profile-header>
      }
    </header>
    <div class="profile-page__line">
      <svg width="332" height="1" viewBox="0 0 332 1" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M0.500328 0.5H331.088"
          stroke="white"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-dasharray="1 3"
        />
      </svg>
    </div>
    @if (profile$ | async; as profile) {
      <h3 class="profile-page__skills">Навыки</h3>
      <div class="skills-wrapper">
        @for (skill of profile.stack; track $index) {
          <div class="skill-tag">{{ skill }}</div>
        }
      </div>
      <h3 class="profile-page__about-me">О себе</h3>
      <div class="about-me-wrapper">
        {{ profile.description }}
      </div>
    }
  </div>
  <div class="settings-save">
    <form class="profile-form__wrapper" [formGroup]="form">
      <div class="profile-form">
        <div class="two-columns">
          <label class="tt-form-label">
            <span class="tt-form-label__text">Имя <span class="required-star">*</span></span>
            <input type="text" class="tt-form-input" placeholder="Введите данные" formControlName="firstName" />
          </label>
          <label class="tt-form-label">
            <span class="tt-form-label__text">Фамилия <span class="required-star">*</span></span>
            <input type="text" class="tt-form-input" formControlName="lastName" />
          </label>
        </div>
        <label class="tt-form-label">
          <span class="tt-form-label__text">Telegram username</span>
          <input type="text" class="tt-form-input" formControlName="username" />
        </label>
        <label class="tt-form-label">
          <span class="tt-form-label__text">О себе</span>
          <textarea formControlName="description" class="tt-form-input tt-textarea" rows="4"></textarea>
        </label>
        <div class="tt-form-label">
          <span class="tt-form-label__text">Аватарка</span>
          <div class="tt-form-avatar">
            <tt-avatar-upload></tt-avatar-upload>
          </div>
        </div>
        <!--
        <label class="tt-form-label">
          <span class="tt-form-label__text">Навыки</span>
          <input type="text" class="tt-form-input" formControlName="stack" />
        </label>
         -->
        <div class="tt-form-label">
          <span class="tt-form-label__text">Навыки</span>
        </div>
        <tt-stack-custom-control formControlName="stack"></tt-stack-custom-control>
        <a [routerLink]="['/experimental']" class="experimental-form"> Experimental form </a>
      </div>
      <div class="profile-controls">
        <div class="profile-actions">
          <a href="/delete-profile" class="btn-limpid profile-actions__delete">
            <svg icon="delete-profile" class="delete-profile-icon"></svg>
          </a>
          <button type="button" class="btn-limpid profile-actions__logout" (click)="onLogout()">
            <svg icon="logout" class="logout-icon"></svg>
          </button>
        </div>
        <div class="settings-controls">
          <button type="button" class="btn-limpid settings-controls__cancel" (click)="onUndo()">Отмена</button>
          <button type="submit" class="btn settings-controls__save" (click)="onSave()">Сохранить</button>
        </div>
      </div>
    </form>
  </div>
</div>
