<div class="avatar-image">
  <img [src]="preview()" alt="avatar placeholder" />
</div>
<div dnd class="dropzone" (fileDropped)="onFileDroped($event)">
  <button type="button" (click)="fileDrop.click()" class="dropzone-content">
    <svg icon="onDark" class="dropzone-upload-icon"></svg>
    <span class="dropzone-text">Перетащите изображение или Загрузите</span>
  </button>

  <input tabindex="-1" class="avatar-input" type="file" #fileDrop (change)="fileBrowserHandler($event)" />
</div>
