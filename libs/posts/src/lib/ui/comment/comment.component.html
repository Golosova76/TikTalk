@if (comment(); as comment) {
  <div class="comment-avatar">
    <tt-avatar-circle [avatarUrl]="comment.author.avatarUrl" [class]="'size32'"></tt-avatar-circle>
  </div>

  <div class="comment-body">
    <div class="comment-header">
      <div class="comment__author">{{ comment.author.username }}</div>
      <div class="comment-created-at">{{ comment.createdAt | luxonDate }}</div>
    </div>
    <div class="comment-content">
      <p class="comment-text">{{ comment.text }}</p>
    </div>
  </div>
}
